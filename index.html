/* ═══ AUDIO ENGINE ══════════════════════════════════════ */
class AudioEngine {
  constructor(){
    this.ctx=null;this.chains=new Map();
    this.masterGain=null;this.masterAnalyser=null;this.masterLimiter=null;
    this.reverbReturn=null;this.reverbNode=null;
    this.delayReturn=null;this.delayNode=null;this.delayFeedback=null;
    this.ready=false;this._lufs=-70;this._peak=-70;
    this._latency=0;this._buffer=256;
  }
  init(){
    if(this.ready)return;
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    const opts={sampleRate:48000};
    if(!BR.isSafari)opts.latencyHint="interactive";
    this.ctx=new AC(opts);
    this._buffer=BR.isSafari?512:BR.isFF?256:128;
    this.masterGain=this.ctx.createGain();this.masterGain.gain.value=0.85;
    this.masterLimiter=this.ctx.createDynamicsCompressor();
    this.masterLimiter.threshold.value=-0.5;this.masterLimiter.ratio.value=20;
    this.masterLimiter.attack.value=0.001;this.masterLimiter.release.value=0.1;
    this.masterLimiter.knee.value=0;
    this.masterAnalyser=this.ctx.createAnalyser();
    this.masterAnalyser.fftSize=4096;this.masterAnalyser.smoothingTimeConstant=0.82;
    try{
      const sp=this.ctx.createScriptProcessor(4096,2,2);
      sp.onaudioprocess=e=>{
        const L=e.inputBuffer.getChannelData(0),R=e.inputBuffer.getChannelData(1)||L;
        let sum=0;for(let i=0;i<L.length;i++)sum+=L[i]*L[i]+R[i]*R[i];
        const rms=Math.sqrt(sum/(L.length*2));
        this._lufs=rms>0?20*Math.log10(rms)-0.691:-70;
        let pk=0;for(let i=0;i<L.length;i++){const a=Math.abs(L[i]);if(a>pk)pk=a;}
        this._peak=pk>0?20*Math.log10(pk):-70;
      };
      this.masterGain.connect(this.masterLimiter);
      this.masterLimiter.connect(this.masterAnalyser);
      this.masterAnalyser.connect(sp);
      sp.connect(this.ctx.destination);
    }catch(err){
      this.masterGain.connect(this.masterLimiter);
      this.masterLimiter.connect(this.masterAnalyser);
      this.masterAnalyser.connect(this.ctx.destination);
    }
    this._buildFX();
    this._startLatencyMonitor();
    this.ready=true;
  }
  resume(){if(this.ctx&&this.ctx.state==="suspended")this.ctx.resume();}
  _buildFX(){
    const c=this.ctx;
    this.reverbReturn=c.createGain();this.reverbReturn.gain.value=0.7;
    this.reverbNode=c.createConvolver();this.reverbNode.buffer=this._makeIR(2.2,0.55);
    this.reverbReturn.connect(this.reverbNode);this.reverbNode.connect(this.masterGain);
    this.delayReturn=c.createGain();this.delayReturn.gain.value=0.6;
    this.delayNode=c.createDelay(3);this.delayNode.delayTime.value=0.375;
    this.delayFeedback=c.createGain();this.delayFeedback.gain.value=0.35;
    const dlpf=c.createBiquadFilter();dlpf.type="lowpass";dlpf.frequency.value=4000;
    this.delayReturn.connect(this.delayNode);
    this.delayNode.connect(dlpf);dlpf.connect(this.delayFeedback);
    this.delayFeedback.connect(this.delayNode);this.delayNode.connect(this.masterGain);
  }
  _makeIR(dur,decay){
    const sr=this.ctx.sampleRate,len=Math.floor(sr*dur);
    const buf=this.ctx.createBuffer(2,len,sr);
    for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++){const t=i/len;d[i]=(Math.random()*2-1)*Math.pow(1-t,decay*3);}}
    return buf;
  }
  _startLatencyMonitor(){
    setInterval(()=>{
      if(!this.ctx)return;
      const l=((this.ctx.baseLatency||0)+(this.ctx.outputLatency||0))*1000;
      this._latency=l||this._latency;
    },3000);
  }
  addChannel(id){
    if(!this.ready)this.init();
    if(this.chains.has(id))return this.chains.get(id);
    const c=this.ctx;
    const EQF=[60,120,250,500,1000,3000,8000,16000];
    const EQT=["lowshelf","peaking","peaking","peaking","peaking","peaking","peaking","highshelf"];
    const chain={
      buffer:null,source:null,playing:false,
      gain:c.createGain(),panner:c.createStereoPanner(),
      eq:EQF.map((freq,i)=>{const f=c.createBiquadFilter();f.type=EQT[i];f.frequency.value=freq;f.Q.value=(i===0||i===7)?0.7:1;f.gain.value=0;return f;}),
      comp:(()=>{const co=c.createDynamicsCompressor();co.threshold.value=-24;co.ratio.value=4;co.attack.value=0.003;co.release.value=0.25;co.knee.value=6;return co;})(),
      sat:c.createWaveShaper(),satGain:c.createGain(),
      analyser:(()=>{const a=c.createAnalyser();a.fftSize=1024;a.smoothingTimeConstant=0.85;return a;})(),
      reverbSend:c.createGain(),delaySend:c.createGain(),
    };
    chain.gain.gain.value=0.75;chain.satGain.gain.value=1;
    chain.sat.curve=this._satCurve(0);
    chain.reverbSend.gain.value=0;chain.delaySend.gain.value=0;
    let prev=chain.gain;for(const f of chain.eq){prev.connect(f);prev=f;}
    prev.connect(chain.panner);chain.panner.connect(chain.analyser);
    chain.analyser.connect(chain.comp);chain.comp.connect(chain.sat);
    chain.sat.connect(chain.satGain);chain.satGain.connect(this.masterGain);
    chain.analyser.connect(chain.reverbSend);chain.reverbSend.connect(this.reverbReturn);
    chain.analyser.connect(chain.delaySend);chain.delaySend.connect(this.delayReturn);
    this.chains.set(id,chain);return chain;
  }
  loadFile(id,file){
    return new Promise((res,rej)=>{
      this.init();this.resume();
      const reader=new FileReader();
      reader.onload=e=>{
        const ab=e.target.result;
        const chain=this.chains.get(id)||this.addChannel(id);
        this.ctx.decodeAudioData(ab,(audio)=>{chain.buffer=audio;res(audio);},(err)=>rej(err));
      };
      reader.onerror=rej;
      reader.readAsArrayBuffer(file);
    });
  }
  play(id){
    const ch=this.chains.get(id);if(!ch||!ch.buffer)return;this.resume();
    if(ch.source){try{ch.source.stop();}catch(e){}}
    ch.source=this.ctx.createBufferSource();ch.source.buffer=ch.buffer;
    ch.source.loop=true;ch.source.connect(ch.gain);ch.source.start();ch.playing=true;
  }
  stop(id){const ch=this.chains.get(id);if(!ch||!ch.source)return;try{ch.source.stop();ch.source=null;ch.playing=false;}catch(e){}}
  setVol(id,v){const c=this.chains.get(id);if(c&&this.ctx)c.gain.gain.setTargetAtTime(v/100,this.ctx.currentTime,.01);}
  setPan(id,v){const c=this.chains.get(id);if(c&&this.ctx)c.panner.pan.setTargetAtTime((v-50)/50,this.ctx.currentTime,.01);}
  setMute(id,m){const c=this.chains.get(id);if(c&&this.ctx)c.gain.gain.setTargetAtTime(m?0:1,this.ctx.currentTime,.02);}
  setEQ(id,b,g){const c=this.chains.get(id);if(c&&c.eq[b]&&this.ctx)c.eq[b].gain.setTargetAtTime(g,this.ctx.currentTime,.01);}
  setComp(id,p){
    const c=this.chains.get(id);if(!c)return;
    if(p.threshold!==undefined)c.comp.threshold.value=p.threshold;
    if(p.ratio!==undefined)c.comp.ratio.value=p.ratio;
    if(p.attack!==undefined)c.comp.attack.value=p.attack/1000;
    if(p.release!==undefined)c.comp.release.value=p.release/1000;
    if(p.knee!==undefined)c.comp.knee.value=p.knee;
  }
  getGR(id){const c=this.chains.get(id);return c?Math.abs(c.comp.reduction||0):0;}
  setSat(id,a){const c=this.chains.get(id);if(!c)return;c.sat.curve=this._satCurve(a);c.satGain.gain.value=a>0?1/(1+a*.08):1;}
  _satCurve(a){const n=512,cur=new Float32Array(n),k=Math.max(0,a/12);for(let i=0;i<n;i++){const x=(2*i/(n-1))-1;cur[i]=k>0?(Math.PI+k)*x/(Math.PI+k*Math.abs(x)):x;}return cur;}
  setReverbSend(id,v){const c=this.chains.get(id);if(c&&this.ctx)c.reverbSend.gain.setTargetAtTime(v/100,this.ctx.currentTime,.01);}
  setDelaySend(id,v){const c=this.chains.get(id);if(c&&this.ctx)c.delaySend.gain.setTargetAtTime(v/100,this.ctx.currentTime,.01);}
  setReverbSize(s){if(this.reverbNode)this.reverbNode.buffer=this._makeIR(s*.05+.5,.3+s*.01);}
  setDelayTime(ms){if(this.delayNode&&this.ctx)this.delayNode.delayTime.setTargetAtTime(ms/1000,this.ctx.currentTime,.01);}
  setDelayFeedback(v){if(this.delayFeedback&&this.ctx)this.delayFeedback.gain.setTargetAtTime(v/100,this.ctx.currentTime,.01);}
  setMasterVol(v){if(this.masterGain&&this.ctx)this.masterGain.gain.setTargetAtTime(v/100,this.ctx.currentTime,.01);}
  getMasterFFT(){if(!this.masterAnalyser)return null;const d=new Uint8Array(this.masterAnalyser.frequencyBinCount);this.masterAnalyser.getByteFrequencyData(d);return d;}
  getEQNodes(id){const c=this.chains.get(id);return c?c.eq:null;}
  getLUFS(){return this._lufs;}
  getPeak(){return this._peak;}
  getLatency(){return this._latency;}
  getBuffer(){return this._buffer;}
  async exportWAV(ids,sr=48000){
    if(!this.ctx)return null;
    const dur=Math.max(0,...ids.map(id=>{const c=this.chains.get(id);return c&&c.buffer?c.buffer.duration:0;}));
    if(dur<=0)return null;
    const off=new OfflineAudioContext(2,Math.ceil(sr*dur),sr);
    const gm=off.createGain();gm.gain.value=0.85;
    const lim=off.createDynamicsCompressor();lim.threshold.value=-0.5;lim.ratio.value=20;
    gm.connect(lim);lim.connect(off.destination);
    for(const id of ids){
      const c=this.chains.get(id);if(!c||!c.buffer)continue;
      const src=off.createBufferSource();src.buffer=c.buffer;
      const g=off.createGain();g.gain.value=c.gain.gain.value;
      const p=off.createStereoPanner();p.pan.value=c.panner.pan.value;
      let prev=src;src.connect(g);prev=g;
      for(let b=0;b<c.eq.length;b++){
        const eq=off.createBiquadFilter();eq.type=c.eq[b].type;
        eq.frequency.value=c.eq[b].frequency.value;eq.Q.value=c.eq[b].Q.value;eq.gain.value=c.eq[b].gain.value;
        prev.connect(eq);prev=eq;
      }
      prev.connect(p);p.connect(gm);src.start(0);
    }
    const rendered=await off.startRendering();
    return this._encodeWAV(rendered);
  }
  _encodeWAV(buf){
    const nCh=buf.numberOfChannels,sr=buf.sampleRate,len=buf.length;
    const bps=3,ba=nCh*bps,total=44+len*ba;
    const ab=new ArrayBuffer(total),v=new DataView(ab);
    const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
    ws(0,"RIFF");v.setUint32(4,36+len*ba,true);ws(8,"WAVE");
    ws(12,"fmt ");v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,nCh,true);
    v.setUint32(24,sr,true);v.setUint32(28,sr*ba,true);v.setUint16(32,ba,true);v.setUint16(34,24,true);
    ws(36,"data");v.setUint32(40,len*ba,true);
    const chs=Array.from({length:nCh},(_,c)=>buf.getChannelData(c));
    let o=44;
    for(let i=0;i<len;i++){for(let c=0;c<nCh;c++){
      const s=Math.max(-1,Math.min(1,chs[c][i]));
      const val=s<0?s*0x800000:s*0x7FFFFF;
      v.setUint8(o,val&0xFF);v.setUint8(o+1,(val>>8)&0xFF);v.setUint8(o+2,(val>>16)&0xFF);o+=3;
    }}
    return ab;
  }
  downloadWAV(ab,name="rocaudio_firex_export.wav"){
    const blob=new Blob([ab],{type:"audio/wav"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),5000);
  }
}

/* ═══ UNDO/REDO HISTORY ════════════════════════════════ */
function histReducer(s,a){
  if(a.type==="SET")return{past:[...s.past,s.present].slice(-40),present:a.p,future:[]};
  if(a.type==="UNDO"){if(!s.past.length)return s;return{past:s.past.slice(0,-1),present:s.past[s.past.length-1],future:[s.present,...s.future]};}
  if(a.type==="REDO"){if(!s.future.length)return s;return{past:[...s.past,s.present],present:s.future[0],future:s.future.slice(1)};}
  return s;
}
function useHistory(init){
  const[s,d]=useReducer(histReducer,{past:[],present:init,future:[]});
  const set=useCallback(p=>d({type:"SET",p}),[]);
  const undo=useCallback(()=>d({type:"UNDO"}),[]);
  const redo=useCallback(()=>d({type:"REDO"}),[]);
  return[s.present,set,undo,redo,s.past.length>0,s.future.length>0];
}

function Knob({label,value,onChange,min=0,max=100,color=T.cyan,size=42,unit="",tip}){
  const drag=useRef(false),sY=useRef(0),sV=useRef(0);
  const pct=(value-min)/(max-min),ang=-135+pct*270;
  const r=size/2-5,cx=size/2,cy=size/2,rad=d=>d*Math.PI/180;
  const arc=(a1,a2)=>{
    const x1=cx+r*Math.cos(rad(a1)),y1=cy+r*Math.sin(rad(a1));
    const x2=cx+r*Math.cos(rad(a2)),y2=cy+r*Math.sin(rad(a2));
    return `M${x1} ${y1} A${r} ${r} 0 ${a2-a1>180?1:0} 1 ${x2} ${y2}`;
  };
  const tx=cx+(r-2)*Math.cos(rad(ang)),ty=cy+(r-2)*Math.sin(rad(ang));
  const onDown=e=>{
    drag.current=true;sY.current=e.clientY;sV.current=value;

/* ═══ VISUALIZER COMPONENTS ═════════════════════════════ */
function Waveform({buffer,color,w=64,h=20}){
  const ref=useRef();
  useEffect(()=>{
    const canvas=ref.current;if(!canvas||!buffer)return;
    const ctx=canvas.getContext("2d");
    canvas.width=w*2;canvas.height=h*2;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const data=buffer.getChannelData(0),step=Math.ceil(data.length/(w*2));
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.shadowColor=color;ctx.shadowBlur=4;
    ctx.beginPath();
    for(let i=0;i<w*2;i++){
      let mn=1,mx=-1;
      for(let j=0;j<step;j++){const s=data[i*step+j]||0;if(s<mn)mn=s;if(s>mx)mx=s;}
      ctx.moveTo(i,(canvas.height/2)+(mn*canvas.height/2));
      ctx.lineTo(i,(canvas.height/2)+(mx*canvas.height/2));
    }
    ctx.stroke();ctx.shadowBlur=0;
  },[buffer,color,w,h]);
  if(!buffer)return null;
  return <canvas ref={ref} style={{display:"block",width:"100%",height:h,opacity:.85}}/>;
}

function Spectrum({engineRef,h=80,color=T.cyan,label="MASTER SPECTRUM"}){
  const ref=useRef(),raf=useRef();
  useEffect(()=>{
    const canvas=ref.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const draw=()=>{
      const eng=engineRef.current,fft=eng?eng.getMasterFFT():null;
      const W=canvas.width,H=canvas.height;
      ctx.clearRect(0,0,W,H);
      ctx.strokeStyle=T.border+"88";ctx.lineWidth=.5;
      [.25,.5,.75].forEach(y=>{ctx.beginPath();ctx.moveTo(0,H*y);ctx.lineTo(W,H*y);ctx.stroke();});
      [[60,"60"],[250,"250"],[1000,"1k"],[4000,"4k"],[16000,"16k"]].forEach(([hz,l])=>{
        const x=(Math.log10(hz/20)/Math.log10(24000/20))*W;
        ctx.strokeStyle=T.border+"44";ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
        ctx.fillStyle=T.muted+"cc";ctx.font="8px 'Share Tech Mono'";ctx.fillText(l,x+2,H-3);
      });
      if(fft&&fft.length>0){
        const N=fft.length;
        const g=ctx.createLinearGradient(0,0,0,H);
        g.addColorStop(0,color+"bb");g.addColorStop(.5,color+"44");g.addColorStop(1,color+"08");
        ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,H);
        for(let i=0;i<N;i++)ctx.lineTo(i/N*W,H-(fft[i]/255)*H);
        ctx.lineTo(W,H);ctx.closePath();ctx.fill();
        ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.shadowColor=color;ctx.shadowBlur=4;
        ctx.beginPath();
        for(let i=0;i<N;i++){const x=i/N*W,y=H-(fft[i]/255)*H;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
        ctx.stroke();ctx.shadowBlur=0;
      }else{
        ctx.strokeStyle=color+"22";ctx.lineWidth=1;ctx.beginPath();
        for(let x=0;x<W;x++){const y=H-(Math.random()*3+1);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
        ctx.stroke();
      }
      raf.current=requestAnimationFrame(draw);
    };
    draw();return()=>cancelAnimationFrame(raf.current);
  },[engineRef,color]);
  return(
    <Tip text="Real-time FFT spectrum analyzer — 20Hz to 20kHz frequency content of your master mix">
      <div style={{background:T.chassis,border:`1px solid ${T.border}`,borderRadius:4,overflow:"hidden",position:"relative",width:"100%"}}>
        <div style={{position:"absolute",top:6,left:10,...fnt(8,700),color,letterSpacing:3,zIndex:1,textShadow:`0 0 8px ${color}88`}}>{label}</div>
        <canvas ref={ref} width={800} height={h} style={{display:"block",width:"100%"}}/>
      </div>
    </Tip>
  );
}

function LUFSMeter({engineRef}){
  const[lufs,setL]=useState(-70),[peak,setP]=useState(-70),[maxPk,setM]=useState(-70);
  const raf=useRef();
  useEffect(()=>{
    const tick=()=>{
      if(engineRef.current&&engineRef.current.ready){
        const l=engineRef.current.getLUFS(),p=engineRef.current.getPeak();
        setL(l);setP(p);setM(m=>Math.max(m,p));
      }
      raf.current=requestAnimationFrame(tick);
    };
    tick();return()=>cancelAnimationFrame(raf.current);
  },[engineRef]);
  const lc=lufs>-9?T.heat:lufs>-14?T.yellow:T.green;
  const pc=peak>-1?T.heat:peak>-6?T.yellow:T.green;
  return(
    <div style={{display:"flex",gap:14,alignItems:"center",padding:"7px 14px",background:T.chassis,border:`1px solid ${T.border}`,borderRadius:4,flexWrap:"wrap",marginBottom:6}}>
      <span style={{...fnt(8,700),color:T.muted,letterSpacing:2}}>LOUDNESS</span>
      {[["LUFS",lufs.toFixed(1),Math.max(0,(lufs+70)/70),lc,"Integrated loudness"],
        ["PEAK",peak.toFixed(1),Math.max(0,(peak+60)/60),pc,"True peak — keep below -0.3dBFS"],
        ["MAX PK",maxPk.toFixed(1),Math.max(0,(maxPk+60)/60),maxPk>-1?T.red:T.muted,"Max peak hold"]].map(([lbl,val,norm,col,t])=>(
        <Tip key={lbl} text={t}>
          <div style={{display:"flex",flexDirection:"column",gap:3,minWidth:84}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{...fnt(7,700),color:T.muted,letterSpacing:1}}>{lbl}</span>
              <Seg value={val} color={col}/>
            </div>
            <div style={{height:4,background:T.dim,borderRadius:2}}>
              <div style={{height:"100%",width:`${norm*100}%`,background:col,borderRadius:2,boxShadow:`0 0 5px ${col}88`,transition:"width .1s ease"}}/>
            </div>
          </div>
        </Tip>
      ))}
      <Tip text="Reset max peak hold">
        <button onClick={()=>setM(-70)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:3,color:T.text,padding:"2px 6px",...fnt(8,700),cursor:"pointer"}}>RESET</button>
      </Tip>
    </div>
  );
}

      <LUFSMeter engineRef={engineRef}/>

      {/* Dynamic Module Router Workspace */}
      {tab==="mix" && <MixModule engineRef={engineRef} channels={channels} setChannels={setChannels}/>}
      {tab==="fx"  && <MasterModule engineRef={engineRef}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>
</body>
</html>
